apiVersion: apps/v1
kind: Deployment
metadata:
  name: springuma
spec:
  replicas: 1
  selector:
    matchLabels:
      app: springuma
  template:
    metadata:
      labels:
        app: springuma
    spec:
      containers:
      - name: springuma
        image: DOCKER_HUB_USERNAME/springuma:latest
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: springuma-service
spec:
  type: NodePort
  selector:
    app: springuma
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30080
