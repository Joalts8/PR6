name: integrationTest.yml
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write
  checks: write
  pull-requests: write

jobs:
  integration_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: maven

      - name: Set execute permission for mvnw
        run: chmod +x mvnw

      - name: Run Integration tests with Maven
        run: ./mvnw -B verify
